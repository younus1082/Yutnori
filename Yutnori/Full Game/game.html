<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yutnori (윷놀이)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/board.css" />
  <!-- New board/appearance theme layer — visual only, loaded last so it wins. -->
  <link rel="stylesheet" href="css/board-theme.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1>Yutnori <span class="hangul">윷놀이</span></h1>
      <div id="header-toggles">
        <button id="home-btn" type="button" title="Back to home">⌂ Home</button>
        <button id="lang-en-btn" type="button">EN</button>
        <button id="lang-ko-btn" type="button">한국어</button>
        <button id="mute-btn" type="button">Sound: On</button>
      </div>
    </header>
    <div class="saekdong-stripe" aria-hidden="true"></div>

    <section id="setup-screen"></section>

    <section id="game-screen" hidden>
      <div id="game-layout">
        <div class="board-col">
          <div class="board-eyebrow">말판 · The Board</div>
          <div id="board-wrap">
            <span class="frame-corner tl" aria-hidden="true"></span>
            <span class="frame-corner tr" aria-hidden="true"></span>
            <span class="frame-corner bl" aria-hidden="true"></span>
            <span class="frame-corner br" aria-hidden="true"></span>
            <svg id="board-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>

        <div class="panel-col">
          <div id="turn-banner"></div>

          <!-- Home / finished counts, moved up for visibility (README §6). -->
          <div id="scoreboard"></div>

          <div id="controls-panel">
            <div id="yut-sticks">
              <div class="yut-stick marked"><div class="face round"></div><div class="face flat"><span class="xmark bd">✕</span></div></div>
              <div class="yut-stick"><div class="face round"></div><div class="face flat"><span class="xmark">✕</span><span class="xmark">✕</span><span class="xmark">✕</span><span class="xmark">✕</span></div></div>
              <div class="yut-stick"><div class="face round"></div><div class="face flat"><span class="xmark">✕</span><span class="xmark">✕</span><span class="xmark">✕</span><span class="xmark">✕</span></div></div>
              <div class="yut-stick"><div class="face round"></div><div class="face flat"><span class="xmark">✕</span><span class="xmark">✕</span><span class="xmark">✕</span><span class="xmark">✕</span></div></div>
            </div>
            <button id="throw-btn" type="button">Throw Sticks</button>
            <div id="throw-result-announce" aria-live="polite"></div>
            <div id="pending-throws"></div>
            <div id="assign-panel" hidden></div>
          </div>

          <div class="panel-actions">
            <button id="rules-btn" type="button">How to Play</button>
            <button id="new-game-btn" type="button">New Game</button>
          </div>
          <div id="rules-panel" hidden></div>
        </div>
      </div>

      <div id="victory-banner" hidden></div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
